# Cross.toml - Configuration for cross-compilation
# GUI cross-compilation requires X11 development libraries

[target.x86_64-unknown-linux-gnu]
pre-build = [
    "apt-get update && apt-get install -y libssl-dev pkg-config libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev libxkbcommon-dev libgtk-3-dev"
]

[target.aarch64-unknown-linux-gnu]
pre-build = [
    "apt-get update && apt-get install -y libssl-dev pkg-config"
]

[target.x86_64-unknown-linux-musl]
# Static build - CLI only, no GUI dependencies

[target.x86_64-pc-windows-gnu]
pre-build = []
